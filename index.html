<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>第五大隊裝備汰換申請系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap');
:root{
  --red:#C62828;--red-dark:#B71C1C;--red-bg:#FFF5F5;
  --bg:#F4F5F7;--surface:#FFF;--surface2:#F9FAFB;
  --border:#E5E7EB;--border-dark:#D1D5DB;
  --text:#0F172A;--text2:#334155;--muted:#64748B;--light:#94A3B8;
  --ok:#16A34A;--ok-bg:#F0FDF4;--ok-bd:#86EFAC;
  --warn:#D97706;--warn-bg:#FFFBEB;--warn-bd:#FCD34D;
  --err-bg:#FEF2F2;--err-bd:#FCA5A5;
  --info:#1D4ED8;--info-bg:#EFF6FF;--info-bd:#93C5FD;
  --sh:0 1px 4px rgba(0,0,0,0.07);
  --sh2:0 4px 16px rgba(0,0,0,0.10);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── HEADER ── */
.hd{background:var(--surface);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:200;box-shadow:var(--sh);}
.hd-brand{display:flex;align-items:center;gap:10px;}
.hd-icon{font-size:22px;}
.hd-title{font-size:15px;font-weight:700;}
.hd-sub{font-size:10px;color:var(--muted);}
.hd-nav{display:flex;gap:2px;}
.nb{background:transparent;border:none;color:var(--muted);padding:7px 12px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.nb:hover{background:var(--bg);color:var(--text);}
.nb.on{background:var(--red);color:#fff;}
@media(max-width:540px){
  .hd-sub{display:none;}
  .nb{font-size:12px;padding:6px 9px;}
  .nb span{display:none;}
}

/* ── BOTTOM NAV (mobile) ── */
.bot-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:200;padding:6px 0 env(safe-area-inset-bottom);}
.bot-nav-inner{display:flex;}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;background:transparent;border:none;color:var(--muted);font-family:inherit;font-size:11px;cursor:pointer;}
.bn .bni{font-size:20px;}
.bn.on{color:var(--red);}
@media(max-width:540px){.bot-nav{display:block;}.view{padding-bottom:120px !important;}} /* 修正：增加底部空間避免遮擋 */

/* ── VIEWS ── */
.view{display:none;padding:20px 16px;max-width:900px;margin:0 auto;}
.view.on{display:block;}
.pg-title{font-size:20px;font-weight:700;margin-bottom:4px;}
.pg-sub{font-size:14px;color:var(--muted);margin-bottom:20px;}
.divider{height:1px;background:var(--border);margin-bottom:20px;}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px;box-shadow:var(--sh);}
.card-t{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;}

/* ── FORM ── */
.fr{margin-bottom:16px;}
.fr:last-child{margin-bottom:0;}
.fr label{display:block;font-size:14px;font-weight:600;color:var(--text2);margin-bottom:6px;}
.fr label .rq{color:var(--red);}
.fr input,.fr select,.fr textarea{width:100%;background:#fff;border:1px solid var(--border-dark);border-radius:8px;color:var(--text);font-family:inherit;font-size:16px;padding:11px 13px;outline:none;appearance:none;transition:border-color .15s,box-shadow .15s;}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(198,40,40,.10);}
.fr input::placeholder,.fr textarea::placeholder{color:var(--light);}
.fr textarea{resize:vertical;min-height:88px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:480px){.fg{grid-template-columns:1fr;}}

/* ── PHOTO UPLOAD ── */
.pup{border:2px dashed var(--border-dark);border-radius:10px;padding:24px;text-align:center;cursor:pointer;position:relative;background:var(--surface2);transition:all .15s;}
.pup:hover,.pup:active{border-color:var(--red);background:var(--red-bg);}
.pup input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.pup-icon{font-size:28px;margin-bottom:6px;}
.pup-txt{font-size:14px;color:var(--muted);}
.pup-note{font-size:12px;color:var(--light);margin-top:4px;}
.photo-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.pt{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer;}

/* ── BUTTONS ── */
.btn-red{background:var(--red);color:#fff;border:none;border-radius:9px;padding:14px;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;width:100%;box-shadow:0 2px 8px rgba(198,40,40,.28);transition:background .15s;}
.btn-red:hover{background:var(--red-dark);}
.btn-red:disabled{opacity:.55;cursor:not-allowed;}

/* ── LOADING OVERLAY ── */
.loading{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;font-size:15px;color:var(--muted);}
.loading.hide{display:none;}
.loader{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--info);border-radius:50%;animation:sp .7s linear infinite;}

/* ── REQ CARD ── */
.rc{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;box-shadow:var(--sh);overflow:hidden;}
.rc.pending{border-left:5px solid var(--warn);}
.rc.approved{border-left:5px solid var(--ok);}
.rc.rejected{border-left:5px solid #DC2626;}
.rc-top{display:flex;align-items:flex-start;}
.rc-info{flex:1;padding:16px 16px 12px;}
.rc-photos{flex-shrink:0;width:140px;background:var(--surface2);border-left:1px solid var(--border);padding:10px;display:flex;flex-direction:column;gap:6px;align-items:center;justify-content:center;}
.rc-photos.empty{display:none;}
.rthumb{width:60px;height:60px;object-fit:cover;border-radius:7px;border:1px solid var(--border);cursor:pointer;}
.rn{font-size:16px;font-weight:700;margin-bottom:5px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(30px);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 20px;font-size:14px;font-weight:500;color:var(--text);z-index:9999;box-shadow:var(--sh2);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── SPINNER ── */
@keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="loading hide" id="loading">
  <div class="loader"></div>
  <div id="loading-msg">載入中...</div>
</div>

<div class="hd">
  <div class="hd-brand">
    <span class="hd-icon">🔥</span>
    <div>
      <div class="hd-title">第五大隊裝備汰換申請系統</div>
      <div class="hd-sub">EQUIPMENT REPLACEMENT MANAGEMENT</div>
    </div>
  </div>
  <nav class="hd-nav" id="top-nav">
    <button class="nb on" onclick="go('report')" id="tn-report">📋 <span>申請</span></button>
    <button class="nb" onclick="go('inventory')" id="tn-inventory">📦 <span>庫存</span></button>
    <button class="nb" onclick="go('admin')" id="tn-admin">🔐 <span>後台</span></button>
  </nav>
</div>

<div class="bot-nav">
  <div class="bot-nav-inner">
    <button class="bn on" onclick="go('report')" id="bn-report"><span class="bni">📋</span>申請</button>
    <button class="bn" onclick="go('inventory')" id="bn-inventory"><span class="bni">📦</span>庫存</button>
    <button class="bn" onclick="go('admin')" id="bn-admin"><span class="bni">🔐</span>後台</button>
  </div>
</div>

<div class="view on" id="view-report">
  <div class="pg-title">裝備汰換申請</div>
  <div class="pg-sub">請填寫以下資料，提交後由大隊承辦人審核</div>
  <div class="divider"></div>

  <div class="card">
    <div class="card-t">📋 基本資料</div>
    <div class="fg">
      <div class="fr">
        <label>所屬單位 <span class="rq">*</span></label>
        <select id="r-unit">
          <option value="">-- 請選擇 --</option>
          <option>大隊部</option><option>土城中隊</option><option>樹林中隊</option>
          <option>三鶯中隊</option><option>清數位隊</option><option>土城分隊</option>
          <option>頂埔分隊</option><option>樹潭分隊</option><option>樹林分隊</option>
          <option>柑園分隊</option><option>隆恩分隊</option><option>三峽分隊</option>
          <option>鶯歌分隊</option><option>鳳鳴分隊</option>
        </select>
      </div>
      <div class="fr">
        <label>填寫人姓名 <span class="rq">*</span></label>
        <input type="text" id="r-name" placeholder="請輸入姓名">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-t">🪖 裝備資訊</div>
    <div class="fr">
      <label>裝備名稱 <span class="rq">*</span></label>
      <select id="r-equip" onchange="onEq()">
        <option value="">-- 請選擇裝備 --</option>
        <option value="gloves">消防手套</option>
        <option value="boots">消防鞋</option>
        <option value="hood">頭套</option>
        <option value="necksafe">護頸</option>
        <option value="mask">面罩眼鏡架</option>
        <option value="light">胸燈</option>
        <option value="helmet">消防帽</option>
      </select>
    </div>
    <div id="spec-row"></div>
    <div id="stock-hint"></div>
    <div class="fr">
      <label>損壞狀況描述 <span class="rq">*</span></label>
      <textarea id="r-cond" placeholder="請詳細描述裝備損壞情形..."></textarea>
    </div>
    <div class="fr">
      <label>汰換原因 <span class="rq">*</span></label>
      <select id="r-reason">
        <option value="">-- 請選擇 --</option>
        <option>超過使用年限</option>
        <option>損壞無法修復</option>
        <option>遺失</option>
        <option>尺寸不合</option>
        <option>其他</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="card-t">📷 損壞照片</div>
    <div class="pup">
      <input type="file" id="r-photos" accept="
